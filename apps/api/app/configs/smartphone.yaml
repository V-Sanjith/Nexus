    display_quality_score: 1.0
  budget:
    cpu_score: 1.0
    ram_score: 1.0
    storage_score: 1.0
    battery_hours: 1.0
    camera_mp: 1.0
    display_quality_score: 1.0
  photography:
    cpu_score: 1.0
    ram_score: 1.0
    storage_score: 1.0
    battery_hours: 1.0
