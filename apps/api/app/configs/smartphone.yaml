attributes:
- key: price
  name: Price
  type: cost
  is_hard_filter: true
- key: camera_mp
  name: Camera
  type: benefit
  is_hard_filter: false
- key: battery_mah
  name: Battery
  type: benefit
  is_hard_filter: false
- key: screen_size
  name: Screen Size
  type: benefit
  is_hard_filter: false
- key: storage_gb
  name: Storage
  type: benefit
  is_hard_filter: true
- key: ram_gb
  name: RAM
  type: benefit
  is_hard_filter: true
- key: processor_score
  name: Processor
  type: benefit
  is_hard_filter: false
personas:
  photographer:
    camera_mp: 2.5
    storage_gb: 1.4
    screen_size: 1.2
  gamer:
    processor_score: 2.2
    ram_gb: 1.5
    battery_mah: 1.3
    screen_size: 1.2
  professional:
    processor_score: 1.8
    ram_gb: 1.6
    storage_gb: 1.4
