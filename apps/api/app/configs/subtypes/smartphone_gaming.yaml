subtype: gaming
category: smartphone
display_name: "Gaming Phones"
description: "Smartphones optimized for gaming performance, thermal management, and long battery life."
default_persona: gamer

# Step 3: Catalog pre-filtering rules
catalog_filters: {}

# Step 4: Dynamic conditional questions
questions:
  - order_index: 1
    question_text: "What is your maximum budget for a gaming smartphone?"
    input_type: budget_range
    options:
      min: 300
      max: 2000
      step: 50
      default: 800
    inr_options:
      min: 25000
      max: 200000
      step: 5000
      default: 65000
    maps_to: price
  - order_index: 2
    question_text: "How important is gaming/processing performance?"
    input_type: slider
    options:
      min: 0
      max: 5
      step: 1
      default: 5
    maps_to: processor_score
  - order_index: 3
    question_text: "How important is battery life and battery capacity?"
    input_type: slider
    options:
      min: 0
      max: 5
      step: 1
      default: 4
    maps_to: battery_mah
  - order_index: 4
    question_text: "What is your preferred screen size for gaming?"
    input_type: single_choice
    options:
      choices: [6.1, 6.4, 6.7, 6.9]
      default: 6.7
      unit: "\""
    maps_to: screen_size

# Step 6: Strict compatibility rules
compatibility_rules: {}
