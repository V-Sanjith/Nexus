subtype: flagship
category: smartphone
display_name: "Flagship Phones"
description: "Premium smartphones with cutting-edge technology, top build quality, and peak specifications."
default_persona: professional

# Step 3: Catalog pre-filtering rules
catalog_filters: {}

# Step 4: Dynamic conditional questions
questions:
  - order_index: 1
    question_text: "What is your maximum budget for a flagship smartphone?"
    input_type: budget_range
    options:
      min: 600
      max: 2500
      step: 50
      default: 1100
    inr_options:
      min: 50000
      max: 250000
      step: 5000
      default: 95000
    maps_to: price
  - order_index: 2
    question_text: "How important is peak processing performance?"
    input_type: slider
    options:
      min: 0
      max: 5
      step: 1
      default: 5
    maps_to: processor_score
  - order_index: 3
    question_text: "How important is premium build material and build quality?"
    input_type: slider
    options:
      min: 0
      max: 5
      step: 1
      default: 4
    maps_to: build_score
  - order_index: 4
    question_text: "What is your minimum RAM requirement?"
    input_type: single_choice
    options:
      choices: [8, 12, 16]
      default: 8
      unit: "GB"
    maps_to: ram_gb

# Step 6: Strict compatibility rules
compatibility_rules: {}
