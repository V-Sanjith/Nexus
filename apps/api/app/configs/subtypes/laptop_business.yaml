subtype: business
category: laptop
display_name: "Business Laptops"
description: "Laptops optimized for office work, meetings, security, and travel."
default_persona: business_user

# Step 3: Catalog pre-filtering rules
catalog_filters: {}

# Step 4: Dynamic conditional questions
questions:
  - order_index: 1
    question_text: "What is your maximum budget for a business laptop?"
    input_type: budget_range
    options:
      min: 500
      max: 5000
      step: 100
      default: 1600
    inr_options:
      min: 45000
      max: 500000
      step: 10000
      default: 140000
    maps_to: price
  - order_index: 2
    question_text: "How important is battery runtime for meetings and travel?"
    input_type: slider
    options:
      min: 0
      max: 5
      step: 1
      default: 4
    maps_to: battery_hours
  - order_index: 3
    question_text: "How important is laptop weight and portability?"
    input_type: slider
    options:
      min: 0
      max: 5
      step: 1
      default: 4
    maps_to: weight_kg
  - order_index: 4
    question_text: "How important is build quality and materials?"
    input_type: slider
    options:
      min: 0
      max: 5
      step: 1
      default: 4
    maps_to: build_score
  - order_index: 5
    question_text: "How important is CPU performance for office tasks?"
    input_type: slider
    options:
      min: 0
      max: 5
      step: 1
      default: 3
    maps_to: cpu_score

# Step 6: Strict compatibility rules
compatibility_rules: {}
