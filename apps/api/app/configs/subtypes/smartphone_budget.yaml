subtype: budget
category: smartphone
display_name: "Budget & Value Phones"
description: "Affordable smartphones offering high value, long battery life, and solid everyday performance."
default_persona: student

# Step 3: Catalog pre-filtering rules
catalog_filters: {}

# Step 4: Dynamic conditional questions
questions:
  - order_index: 1
    question_text: "What is your maximum budget for a budget smartphone?"
    input_type: budget_range
    options:
      min: 150
      max: 600
      step: 25
      default: 400
    inr_options:
      min: 10000
      max: 50000
      step: 2000
      default: 30000
    maps_to: price
  - order_index: 2
    question_text: "How important is battery life and long-lasting capacity?"
    input_type: slider
    options:
      min: 0
      max: 5
      step: 1
      default: 5
    maps_to: battery_mah
  - order_index: 3
    question_text: "What is your minimum memory (RAM) requirement?"
    input_type: single_choice
    options:
      choices: [4, 6, 8]
      default: 6
      unit: "GB"
    maps_to: ram_gb
  - order_index: 4
    question_text: "What is your minimum storage requirement?"
    input_type: single_choice
    options:
      choices: [64, 128, 256]
      default: 128
      unit: "GB"
    maps_to: storage_gb

# Step 6: Strict compatibility rules
compatibility_rules: {}
