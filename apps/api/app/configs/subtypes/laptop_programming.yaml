subtype: programming
category: laptop
display_name: "Programming Laptops"
description: "Laptops designed for developers, programmers, and software engineers."
default_persona: developer

# Step 3: Catalog pre-filtering rules
catalog_filters: {}

# Step 4: Dynamic conditional questions
questions:
  - order_index: 1
    question_text: "What is your maximum budget for a programming laptop?"
    input_type: budget_range
    options:
      min: 400
      max: 5000
      step: 100
      default: 1500
    inr_options:
      min: 40000
      max: 500000
      step: 10000
      default: 120000
    maps_to: price
  - order_index: 2
    question_text: "Do you require native Linux support?"
    input_type: single_choice
    options:
      choices: ["Yes", "No"]
      default: "No"
    maps_to: need_linux
  - order_index: 3
    question_text: "What is your minimum memory (RAM) requirement?"
    input_type: single_choice
    options:
      choices: [8, 16, 32, 64]
      default: 16
      unit: "GB"
    maps_to: ram_gb
  - order_index: 4
    question_text: "How important is CPU/Processing performance for compilation?"
    input_type: slider
    options:
      min: 0
      max: 5
      step: 1
      default: 4
    maps_to: cpu_score
  - order_index: 5
    question_text: "How important is Battery Life for coding on the go?"
    input_type: slider
    options:
      min: 0
      max: 5
      step: 1
      default: 4
    maps_to: battery_hours
  - order_index: 6
    question_text: "How important is Portability and weight?"
    input_type: slider
    options:
      min: 0
      max: 5
      step: 1
      default: 3
    maps_to: weight_kg

# Step 6: Strict compatibility rules
compatibility_rules:
  linux_supported:
    eq: true
    depends_on:
      maps_to: need_linux
      value: "Yes"
    reason: "requires native Linux compatibility for open-source development"
