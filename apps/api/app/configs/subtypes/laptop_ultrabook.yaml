subtype: ultrabook
category: laptop
display_name: "Ultrabooks & Slim Laptops"
description: "Ultra-portable, thin, and lightweight laptops featuring exceptional battery life."
default_persona: traveller

# Step 3: Catalog pre-filtering rules
catalog_filters: {}

# Step 4: Dynamic conditional questions
questions:
  - order_index: 1
    question_text: "What is your maximum budget for an ultrabook?"
    input_type: budget_range
    options:
      min: 500
      max: 5000
      step: 100
      default: 1200
    inr_options:
      min: 45000
      max: 500000
      step: 10000
      default: 110000
    maps_to: price
  - order_index: 2
    question_text: "How important is battery runtime for working on the move?"
    input_type: slider
    options:
      min: 0
      max: 5
      step: 1
      default: 5
    maps_to: battery_hours
  - order_index: 3
    question_text: "How important is extreme lightweight design (portability)?"
    input_type: slider
    options:
      min: 0
      max: 5
      step: 1
      default: 5
    maps_to: weight_kg
  - order_index: 4
    question_text: "What is your preferred screen size?"
    input_type: single_choice
    options:
      choices: [13.3, 14.0, 15.0]
      default: 14.0
      unit: "\""
    maps_to: screen_size

# Step 6: Strict compatibility rules
compatibility_rules: {}
