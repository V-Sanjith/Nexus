subtype: student
category: laptop
display_name: "Student Laptops"
description: "Affordable, lightweight laptops designed for school, college, and online learning."
default_persona: student

# Step 3: Catalog pre-filtering rules
catalog_filters: {}

# Step 4: Dynamic conditional questions
questions:
  - order_index: 1
    question_text: "What is your maximum budget for a student laptop?"
    input_type: budget_range
    options:
      min: 300
      max: 3000
      step: 50
      default: 800
    inr_options:
      min: 25000
      max: 250000
      step: 5000
      default: 70000
    maps_to: price
  - order_index: 2
    question_text: "How important is battery runtime for full days of classes?"
    input_type: slider
    options:
      min: 0
      max: 5
      step: 1
      default: 4
    maps_to: battery_hours
  - order_index: 3
    question_text: "How important is a lightweight design to carry in your backpack?"
    input_type: slider
    options:
      min: 0
      max: 5
      step: 1
      default: 4
    maps_to: weight_kg
  - order_index: 4
    question_text: "What is your minimum RAM requirement for schoolwork?"
    input_type: single_choice
    options:
      choices: [8, 16, 32]
      default: 8
      unit: "GB"
    maps_to: ram_gb

# Step 6: Strict compatibility rules
compatibility_rules: {}
