  unit: '"'
similarity_keys:
  spec_keys:
  - weight_kg
  - battery_hours
  - cpu_score
  - gpu_score
  use_case_key: laptop_type
tradeoff_comparisons:
- key: ram_gb
  name: RAM
  type: benefit
  unit: GB
  format_int: true
- key: storage_gb
  name: Storage
  type: benefit
  unit: GB
  format_int: true
- key: weight_kg
  name: Weight
  type: cost
  unit: kg
  precision: 2
- key: battery_hours
  name: Battery Life
  type: benefit
  unit: hours
  precision: 1
- key: cpu_score
  name: CPU Speed
  type: benefit
  unit: points
  format_int: true
- key: gpu_score
  name: Graphics Speed
  type: benefit
  unit: points
  format_int: true
fallback:
  max_results: 10
  constraints:
    price:
      tolerance: 0.2
      weight: 0.4
    ram_gb:
      tolerance: 0.5
      weight: 0.2
    storage_gb:
      tolerance: 0.5
      weight: 0.15
    refresh_rate_hz:
      tolerance: 0.6
      weight: 0.15
    battery_hours:
      tolerance: 0.5
      weight: 0.1
