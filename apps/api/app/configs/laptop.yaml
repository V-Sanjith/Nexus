questions:
- order_index: 1
  question_text: What is your maximum budget?
  input_type: budget_range
  options:
    min: 300
    max: 5000
    step: 100
    default: 1500
  inr_options:
    min: 30000
    max: 500000
    step: 10000
    default: 150000
  maps_to: price
- order_index: 2
  question_text: What is your minimum memory (RAM) requirement?
  input_type: single_choice
  options:
    choices:
    - 8
    - 16
    - 32
    - 64
    default: 16
    unit: GB
  maps_to: ram_gb
- order_index: 3
  question_text: What is your minimum storage space requirement?
  input_type: single_choice
  options:
    choices:
    - 256
    - 512
    - 1024
    - 2048
    default: 512
    unit: GB SSD
  maps_to: storage_gb
- order_index: 4
  question_text: How important is Portability (weight)?
  input_type: slider
  options:
    min: 0
    max: 5
    step: 1
    default: 3
  maps_to: weight_kg
- order_index: 5
  question_text: How important is Battery Life (runtime)?
  input_type: slider
  options:
    min: 0
    max: 5
    step: 1
    default: 3
  maps_to: battery_hours
- order_index: 6
  question_text: How important is CPU/Processing performance?
  input_type: slider
  options:
    min: 0
    max: 5
    step: 1
    default: 3
  maps_to: cpu_score
- order_index: 7
  question_text: How important is GPU/Gaming/Graphics performance?
  input_type: slider
  options:
    min: 0
    max: 5
    step: 1
    default: 3
  maps_to: gpu_score
